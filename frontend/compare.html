<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投資組合比較 — FundLens</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ── Header ──────────────────────────────────── -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">FundLens</a>
      <nav class="main-nav">
        <!-- TODO: 同首頁導覽 -->
      </nav>
    </div>
  </header>

  <main class="container page-main">

    <!-- ── 比較清單列 ────────────────────────────── -->
    <div class="compare-bar">
      <h1 class="compare-bar-title">投資組合比較</h1>
      <div id="compareChips" class="compare-chips">
        <!-- TODO: 從 localStorage 讀取已加入的基金
             渲染成 chip，每個 chip 有移除按鈕
             結構：<span class="chip">基金名稱 <button>×</button></span>
             最多 5 檔，達上限時「＋新增」變 disabled
        -->
      </div>
      <div class="compare-bar-actions">
        <button id="addFundBtn" class="btn btn-outline">＋ 新增基金</button>
        <button id="runCompareBtn" class="btn btn-primary">開始比較</button>
      </div>
    </div>

    <!-- 新增基金搜尋 Modal（預設隱藏）-->
    <div id="addFundModal" class="modal hidden">
      <div class="modal-inner">
        <h3>搜尋基金</h3>
        <input type="text" id="modalSearch" class="search-input" placeholder="輸入名稱或代號..." />
        <div id="modalResults" class="modal-results">
          <!-- TODO: 即時搜尋結果，點擊加入比較清單 -->
        </div>
        <button id="closeModalBtn" class="btn btn-ghost">關閉</button>
      </div>
    </div>

    <!-- ── 比較結果區（呼叫 API 後才顯示）─────────── -->
    <div id="compareResult" class="hidden">

      <!-- 期間切換 -->
      <div class="period-tabs">
        <button class="period-btn active" data-period="1Y">1Y</button>
        <button class="period-btn" data-period="3Y">3Y</button>
        <button class="period-btn" data-period="5Y">5Y</button>
      </div>

      <!-- 上半：走勢疊圖 + 雷達圖 -->
      <div class="layout-two-col">

        <!-- 報酬走勢疊圖 -->
        <div class="card chart-card">
          <h3 class="card-title">報酬走勢比較（起點標準化為 100）</h3>
          <!-- TODO:
            - 呼叫 charts.js 的 drawOverlayChart()
            - 多條折線，每條對應一檔基金（不同顏色）
            - 圖例顯示基金簡稱
          -->
          <canvas id="overlayChart"></canvas>
        </div>

        <!-- 指標雷達圖 -->
        <div class="card chart-card">
          <h3 class="card-title">指標雷達圖</h3>
          <!-- TODO:
            - 呼叫 charts.js 的 drawRadarChart()
            - 各軸：Sharpe / Sortino / Calmar / Alpha / (1-|Beta|) / (1-|MDD|)
            - 注意：MDD 和 Beta 需轉換方向（越小越好 → 反轉）
          -->
          <canvas id="radarChart"></canvas>
        </div>
      </div>

      <!-- 指標對比表格 -->
      <div class="card">
        <h3 class="card-title">指標對比</h3>
        <div class="table-wrapper">
          <table class="compare-table" id="compareTable">
            <thead>
              <tr>
                <th>指標</th>
                <!-- TODO: 動態加入各基金的欄位標題 -->
              </tr>
            </thead>
            <tbody>
              <!-- TODO: 動態渲染以下指標列
                   每列結構：
                   <tr>
                     <td>Sharpe Ratio</td>
                     <td class="val-good">1.23</td>  ← 最高值加 class
                     <td>0.87</td>
                     <td>1.05</td>
                   </tr>
                   
                   指標列順序：
                   Sharpe / Sortino / MDD / Beta / Alpha / Calmar / 年化報酬 / 年化標準差
                   
                   顏色規則：
                   - 正向指標（Sharpe / Sortino / Alpha / Calmar）：最高值標綠
                   - 負向指標（MDD / Beta / 年化標準差）：最低值標綠
              -->
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /compareResult -->

    <!-- 空狀態提示 -->
    <div id="emptyState" class="empty-state">
      <p>請先加入 2 檔以上基金，再點「開始比較」</p>
    </div>

  </main>

  <!-- ── Footer ──────────────────────────────────── -->
  <footer class="site-footer">
    <div class="container">
      <p>本平台資料僅供學術研究參考，不構成投資建議。</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script>
    // TODO: 初始化比較頁
    // 1. 從 localStorage 讀取 compareList（fund_id 陣列）
    // 2. 渲染比較清單 chips
    // 3. 綁定「＋新增基金」→ 開啟 Modal
    // 4. 綁定「開始比較」→ 呼叫 compareFunds(ids, period)
    // 5. compareFunds 成功後：
    //    a. 顯示 #compareResult，隱藏 #emptyState
    //    b. 呼叫 drawOverlayChart()
    //    c. 呼叫 drawRadarChart()
    //    d. 渲染對比表格
    // 6. 綁定期間切換按鈕（重新比較）
    // 7. Modal 搜尋：即時打 GET /funds?q=xxx，點擊加入 compareList
  </script>
</body>
</html>
